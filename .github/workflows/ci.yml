name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: ./gradlew build

      - name: Run golden tests
        run: ./refactorkit test-golden

      - name: Validate architecture documentation
        run: |
          test -f docs/arc42/README.adoc
          test -f docs/arc42/01-introduction-and-goals.adoc
          test -f docs/arc42/12-glossary.adoc
          test -f docs/arc42/appendix-requirements.adoc
          test -f docs/c4/workspace.dsl
          grep -qi 'Status: confirmed' docs/arc42/01-introduction-and-goals.adoc

      - name: Package self-contained CLI
        run: ./gradlew packageCliRuntime distCliRuntimeZip

      - name: Smoke packaged CLI
        run: |
          modules/refactorkit-cli/build/package/refactorkit/bin/refactorkit --help
          modules/refactorkit-cli/build/package/refactorkit/bin/refactorkit scan samples/java-maven-simple

      - name: Upload CLI runtime distribution
        uses: actions/upload-artifact@v4
        with:
          name: refactorkit-runtime
          path: modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip
          if-no-files-found: error
