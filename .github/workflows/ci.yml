name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Python for packaged daemon smoke
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: ./gradlew build

      - name: Run golden tests
        run: ./refactorkit test-golden

      - name: Validate architecture documentation
        run: |
          test -f docs/arc42/README.adoc
          test -f docs/arc42/01-introduction-and-goals.adoc
          test -f docs/arc42/12-glossary.adoc
          test -f docs/arc42/appendix-requirements.adoc
          test -f docs/c4/workspace.dsl
          grep -qi 'Status: confirmed' docs/arc42/01-introduction-and-goals.adoc

      - name: Package self-contained CLI
        run: ./gradlew packageCliRuntime distCliRuntimeZip

      - name: Verify CLI runtime distribution
        run: |
          sha256sum modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip \
            > modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip.sha256
          sha256sum -c modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip.sha256

      - name: Smoke packaged CLI
        run: |
          env -u JAVA_HOME ./gradlew :modules:refactorkit-cli:smokePackagedCli
          env -u JAVA_HOME modules/refactorkit-cli/build/package/refactorkit/bin/refactorkit --help
          for sample in \
            samples/java-maven-simple \
            samples/java-gradle-simple \
            samples/java-spring-simple \
            samples/java-jpa-simple \
            samples/java-multimodule
          do
            env -u JAVA_HOME modules/refactorkit-cli/build/package/refactorkit/bin/refactorkit scan "$sample"
          done

      - name: Run reference workspace budgets
        run: scripts/benchmark-reference.sh modules/refactorkit-cli/build/package/refactorkit/bin/refactorkit

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: modules/refactorkit-cli/build/package/refactorkit
          format: spdx-json
          output-file: modules/refactorkit-cli/build/distributions/refactorkit-runtime.spdx.json
          upload-artifact: false

      - name: Upload CLI runtime distribution
        uses: actions/upload-artifact@v4
        with:
          name: refactorkit-runtime
          path: |
            modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip
            modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip.sha256
            modules/refactorkit-cli/build/distributions/refactorkit-runtime.spdx.json
          if-no-files-found: error

  cross-platform-runtime:
    name: Runtime (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows-x86_64
            gradle: ./gradlew.bat
          - os: macos-15-intel
            platform: macos-x86_64
            gradle: ./gradlew
          - os: macos-15
            platform: macos-aarch64
            gradle: ./gradlew
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Python for packaged daemon smoke
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: ${{ matrix.gradle }} build --no-daemon

      - name: Package and native smoke
        run: ${{ matrix.gradle }} :modules:refactorkit-cli:refactorkitRuntimeZip :modules:refactorkit-cli:smokePackagedCli --no-daemon

      - name: Summarize native test failures
        if: failure()
        shell: python
        run: |
          import pathlib, xml.etree.ElementTree as ET
          found = False
          for report in pathlib.Path("modules").glob("*/build/test-results/test/TEST-*.xml"):
              root = ET.parse(report).getroot()
              for case in root.findall("testcase"):
                  failure = case.find("failure")
                  if failure is None:
                      failure = case.find("error")
                  if failure is not None:
                      found = True
                      message = failure.attrib.get("message", "test failure").replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
                      print(f"::error file={report}::{case.attrib.get('classname')}.{case.attrib.get('name')}: {message}")
          if not found:
              print("No JUnit XML failure was available; inspect the build step.")

      - name: Upload native test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refactorkit-test-reports-${{ matrix.platform }}
          path: modules/*/build/test-results/test/**
          if-no-files-found: ignore

      - name: Name platform artifact and checksum
        shell: python
        run: |
          import hashlib, pathlib, shutil
          source = pathlib.Path("modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip")
          target = source.with_name("refactorkit-runtime-${{ matrix.platform }}.zip")
          shutil.copyfile(source, target)
          digest = hashlib.sha256(target.read_bytes()).hexdigest()
          target.with_suffix(target.suffix + ".sha256").write_text(f"{digest}  {target.name}\n")

      - name: Upload native runtime
        uses: actions/upload-artifact@v4
        with:
          name: refactorkit-runtime-${{ matrix.platform }}
          path: |
            modules/refactorkit-cli/build/distributions/refactorkit-runtime-${{ matrix.platform }}.zip
            modules/refactorkit-cli/build/distributions/refactorkit-runtime-${{ matrix.platform }}.zip.sha256
          if-no-files-found: error
