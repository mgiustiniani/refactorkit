name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: ./gradlew build

      - name: Run golden tests
        run: ./refactorkit test-golden

      - name: Build self-contained CLI runtime
        run: ./gradlew packageCliRuntime distCliRuntimeZip

      - name: Prepare release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp modules/refactorkit-cli/build/distributions/refactorkit-runtime.zip \
            "refactorkit-runtime-${version}-linux-x86_64.zip"
          asset="refactorkit-runtime-${version}-linux-x86_64.zip"
          checksum_file="${asset}.sha256"
          sha256sum "$asset" > "$checksum_file"
          sha256sum -c "$checksum_file"
          checksum="$(awk '{print $1}' "$checksum_file")"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${asset}"

          release_notes=".github/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$release_notes" ]; then
            cp "$release_notes" RELEASE_NOTES.md
          else
            cp .github/RELEASE_TEMPLATE.md RELEASE_NOTES.md
          fi

          python3 - <<PY
          from pathlib import Path
          path = Path("RELEASE_NOTES.md")
          text = path.read_text()
          text = text.replace("Source tag: _TBD before release_", "Source tag: ${GITHUB_REF_NAME}")
          text = text.replace("Release commit: _TBD before release_", "Release commit: ${GITHUB_SHA}")
          text = text.replace("Final URL: _TBD after release artifact is published_", "Final URL: ${asset_url}")
          text = text.replace("Final SHA-256: _TBD after release artifact is built_", "Final SHA-256: ${checksum}")
          path.write_text(text)
          PY

      - name: Smoke release runtime zip
        run: |
          version="${GITHUB_REF_NAME#v}"
          rm -rf release-smoke
          mkdir release-smoke
          unzip -q "refactorkit-runtime-${version}-linux-x86_64.zip" -d release-smoke
          env -u JAVA_HOME release-smoke/refactorkit/bin/refactorkit --help
          env -u JAVA_HOME release-smoke/refactorkit/bin/refactorkit scan samples/java-maven-simple

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: RELEASE_NOTES.md
          files: |
            refactorkit-runtime-*-linux-x86_64.zip
            refactorkit-runtime-*-linux-x86_64.zip.sha256
